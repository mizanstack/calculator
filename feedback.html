<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback - MIZAN</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <nav class="navbar">
        <a href="index.html" class="nav-link">Calculator</a>
        <a href="feedback.html" class="nav-link active">Feedback</a>
    </nav>
    <h1 class="header-title">Feedback</h1>
    <div class="feedback-container">
        <form class="feedback-form" action="#" method="POST">
            <div class="form-group">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" placeholder="Your Name" required>
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="Your Email" required>
            </div>
            <div class="form-group">
                <label for="message">Message</label>
                <textarea id="message" name="message" rows="5" placeholder="Your Feedback" required></textarea>
            </div>
            <button type="submit" class="submit-btn" value="Submit">Submit Feedback</button>
        </form>
    </div>
</body>

</html>
